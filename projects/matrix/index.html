<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матрица Эйзенхауэра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Матрица Эйзенхауэра</h1>
        <div class="matrix">
            <!-- Срочно / Важно -->
            <div class="quadrant q1">
                <div class="header-row">
                    <h2>Срочно / Важно</h2>
                    <button class="clear-btn" title="Очистить всё">🗑️</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Новая задача...">
                    <button class="add-btn">+</button>
                </div>
                <ul class="todo-list" id="list-q1"></ul>
            </div>

            <!-- Несрочно / Важно -->
            <div class="quadrant q2">
                <div class="header-row">
                    <h2>Несрочно / Важно</h2>
                    <button class="clear-btn" title="Очистить всё">🗑️</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Новая задача...">
                    <button class="add-btn">+</button>
                </div>
                <ul class="todo-list" id="list-q2"></ul>
            </div>

            <!-- Срочно / Неважно -->
            <div class="quadrant q3">
                <div class="header-row">
                    <h2>Срочно / Неважно</h2>
                    <button class="clear-btn" title="Очистить всё">🗑️</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Новая задача...">
                    <button class="add-btn">+</button>
                </div>
                <ul class="todo-list" id="list-q3"></ul>
            </div>

            <!-- Несрочно / Неважно -->
            <div class="quadrant q4">
                <div class="header-row">
                    <h2>Несрочно / Неважно</h2>
                    <button class="clear-btn" title="Очистить всё">🗑️</button>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Новая задача...">
                    <button class="add-btn">+</button>
                </div>
                <ul class="todo-list" id="list-q4"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
