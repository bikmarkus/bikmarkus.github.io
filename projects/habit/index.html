<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адаптивный Трекер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Трекер привычек</h2>
        <div class="controls">
            <input type="text" id="habitInput" placeholder="Новая привычка...">
            <button onclick="addHabit()">Добавить</button>
        </div>
        <div class="table-actions">
            <button class="secondary" onclick="changeDays(-1)">- День</button>
            <button class="secondary" onclick="changeDays(1)">+ День</button>
        </div>
        <div class="table-wrapper">
            <table id="habitTable">
                <thead><tr id="headerRow"></tr></thead>
                <tbody id="habitBody"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
