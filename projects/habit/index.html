<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Трекер привычек</h1>
        
        <form id="habit-form" class="controls">
            <input type="text" id="habit-input" placeholder="Название привычки" required>
            <input type="number" id="days-input" value="7" min="1" title="Количество дней">
            <button type="submit" class="btn-add">Добавить</button>
        </form>

        <div id="habit-list" class="habit-list"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
