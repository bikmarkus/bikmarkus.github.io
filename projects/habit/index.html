<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Трекер привычек</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Трекер привычек</h2>
        <div class="input-group">
            <input type="text" id="habitInput" placeholder="Введите новую привычку...">
            <button onclick="addHabit()">Добавить</button>
        </div>
        <table id="habitTable">
            <thead>
                <tr id="headerRow">
                    <th>Привычка</th>
                    <!-- Даты добавятся скриптом -->
                </tr>
            </thead>
            <tbody id="habitBody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
