<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Продвинутый Трекер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Мои привычки</h2>
        <div class="controls">
            <input type="text" id="habitInput" placeholder="Что будем внедрять?">
            <button onclick="addHabit()">Добавить</button>
        </div>
        <div class="table-actions">
            <button class="secondary" onclick="changeDays(-1)">- День</button>
            <button class="secondary" onclick="changeDays(1)">+ День</button>
        </div>
        <table id="habitTable">
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="habitBody"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
