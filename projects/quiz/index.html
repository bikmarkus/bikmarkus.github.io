<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космический Квиз: 110 вопросов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <!-- Экран настройки -->
        <div id="setup-screen">
            <h1>Космический Квиз</h1>
            <p>В нашей базе 110 вопросов. Сколько случайных вопросов вы хотите пройти?</p>
            <input type="number" id="question-count" value="10" min="1" max="110">
            <button onclick="startQuiz()">Начать игру</button>
        </div>

        <!-- Экран вопроса -->
        <div id="quiz-screen" class="hidden">
            <div class="progress">Вопрос <span id="current-num">1</span> из <span id="total-num">10</span></div>
            <div id="question-text" class="question"></div>
            <div id="options-container" class="options"></div>
            <button id="next-btn" class="hidden" onclick="handleNext()">Следующий вопрос</button>
        </div>

        <!-- Экран финала -->
        <div id="result-screen" class="hidden">
            <h2>Игра окончена!</h2>
            <div id="score-text"></div>
            <button onclick="location.reload()">Вернуться в начало</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
