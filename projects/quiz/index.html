<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Литературный Квиз: Random Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="rocket">🚀</div>
    <div id="quiz-container">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div class="stats-row">
            <div id="best-score-label">Рекорд: 0</div>
            <div id="timer-container">
                <svg class="timer-svg" viewBox="0 0 40 40">
                    <circle class="timer-bg" cx="20" cy="20" r="18"></circle>
                    <circle class="timer-line" cx="20" cy="20" r="18"></circle>
                </svg>
                <div id="timer-text">30</div>
            </div>
            <div id="score-counter">Очки: 0</div>
        </div>
        <div id="combo-indicator" style="display: none;">🔥 COMBO X2</div>

        <div id="quiz-content">
            <div id="question">Загрузка...</div>
            <div id="answers"></div>
            <div id="explanation" style="display: none;"></div>
            <button id="next-btn" style="display: none;">Далее</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
