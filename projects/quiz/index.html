<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая Одиссея: 100 вопросов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars"></div>
    <div id="rocket-container"></div>
    
    <div class="quiz-container">
        <!-- Стартовый экран -->
        <div id="start-screen">
            <h1>Космическая Одиссея</h1>
            <p>Выберите количество вопросов в миссии:</p>
            <select id="question-count">
                <option value="15" selected>15 вопросов (Стандарт)</option>
                <option value="25">25 вопросов</option>
                <option value="35">35 вопросов</option>
                <option value="45">45 вопросов</option>
                <option value="100">100 вопросов (Герой)</option>
            </select>
            <button id="start-btn" onclick="startQuiz()">ПОЕХАЛИ!</button>
        </div>

        <!-- Игровой экран -->
        <div id="game-screen" style="display: none;">
            <div class="header">
                <div class="timer-box" id="timer-wrapper">
                    <span id="timer">20</span>
                </div>
                <div id="question-number">Вопрос 1/15</div>
            </div>

            <div id="question-box">
                <h2 id="question-text">Инициализация бортовых систем...</h2>
                <div id="options-container" class="options-grid"></div>
            </div>

            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
