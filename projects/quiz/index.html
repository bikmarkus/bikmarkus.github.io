<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Quiz: High Speed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars"></div>
    <div id="rocket-container"></div>
    
    <div class="quiz-container">
        <div class="header">
            <div class="timer-box" id="timer-wrapper">
                <span id="timer">15</span>
            </div>
            <div id="question-number">Вопрос 1/75</div>
        </div>

        <div id="question-box">
            <h2 id="question-text">Синхронизация...</h2>
            <div id="options-container"></div>
        </div>

        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
