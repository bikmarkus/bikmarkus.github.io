<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космическая Одиссея: Финальный отчет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars"></div>
    <div id="rocket-container"></div>
    
    <div class="quiz-container">
        <!-- Стартовый экран -->
        <div id="start-screen">
            <h1>Космическая Одиссея</h1>
            <p>Выберите масштаб миссии:</p>
            <select id="question-count">
                <option value="15" selected>15 вопросов</option>
                <option value="30">30 вопросов</option>
                <option value="50">50 вопросов</option>
                <option value="115">Полная база (115 вопросов)</option>
            </select>
            <button class="main-btn" onclick="startQuiz()">ПОЕХАЛИ!</button>
        </div>

        <!-- Игровой экран -->
        <div id="game-screen" style="display: none;">
            <div class="header">
                <div class="timer-box" id="timer-wrapper">
                    <span id="timer">20</span>
                </div>
                <div id="question-number">Вопрос 1/15</div>
            </div>
            <div id="question-box">
                <h2 id="question-text">Загрузка данных...</h2>
                <div id="options-container" class="options-grid"></div>
            </div>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <!-- Экран результатов -->
        <div id="results-screen" style="display: none;">
            <h2>Миссия завершена!</h2>
            <div id="score-summary"></div>
            <div id="detailed-stats"></div>
            <button class="main-btn" onclick="location.reload()">В НАЧАЛО</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
